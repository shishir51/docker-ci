name: CI Pipeline

on:
    push:
        branches: ["main"]

env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build Docker image
              run: docker build -t my-app .

            - name: Run container test
              run: | 
                    docker run -d -p 5000:5000 my-app
                    echo "=== Containers ==="
                    docker ps -a
                    echo "=== Logs ==="
                    CONTAINER_ID=$(docker ps -aq | head -n 1)
                    if [ ! -z "$CONTAINER_ID" ]; then
                      echo "Container found: $CONTAINER_ID"
                      docker logs $CONTAINER_ID
                    else
                      echo "No container found"
                    fi
                    
                    echo "Waiting for app to start..."
                    sleep 10
                    curl --retry 15 --retry-delay 3 --retry-connrefused http://localhost:5000
                
            - name: Debug secrets
              run: |
                    if [ -z "$DOCKER_USERNAME" ]; then
                        echo "Username is EMPTY"
                    else
                        echo "Username is Set"
                    fi
              env:
                  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    
            - name: Login to Docker Hub
              run: |
                    echo "Username length: ${#DOCKER_USERNAME}"
                    echo "${{ secrets.SHISHIR51_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
                    
            - name: Build and Push image
              run: |
                    docker build -t shishir51/docker-ci .
                    docker push shishir51/docker-ci
                
